version: '3'

services:
  postgres:
    image: postgres
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run dashboard/app.py
    ports:
      - "8501:8501"